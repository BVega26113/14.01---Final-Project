<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downtown Donuts | Leave a Comment</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Italianno&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="header-style">
        <nav>
            <a href="/">Home</a>
            <a href="/menu">Menu</a>
            <a href="/about">About Us</a>
            <a href="/comments">Comments</a>
        </nav>

         <img src="Logo.png" alt="Downtown Donuts Logo" style="position: absolute; top: 10px; right: 20px; width: 100px; height: auto;">
    </header>

    <main class="container">
        <p style="text-align: center; font-size: 2rem; font-weight: bold;">Customer Reviews</p>
        <p style="text-align: center;">We'd love to hear from you!</p>

        <div class="comment-form-container">
            <form id="reviewForm">
                <div class="form-group">
                    <label for="username">Your Name</label>
                    <input type="text" id="username" name="username" required placeholder="Enter your name">
                </div>

                <div class="form-group">
                    <label for="commentText">Your Review</label>
                    <textarea id="commentText" name="commentText" rows="5" maxlength="500" required placeholder="What did you think of our donuts?"></textarea>
                    <small>Maximum 500 characters</small>
                </div>

                <button type="submit" class="btn-submit">Post Comment</button>
            </form>
        </div>

        <section id="comments-list">
            <h2>Recent Comments</h2>
            <div id="comments-placeholder">
                <p>Loading comments...</p>
            </div>
        </section>

        <nav class="pagination" aria-label="Comment pagination">
            <button onclick="fetchComments(1)">1</button>
            <button onclick="fetchComments(2)">2</button>
        </nav>
    </main>

    <footer>
        <p>&copy; 2026 Downtown Donuts. All rights reserved.</p>
    </footer>

    <script>
        async function fetchComments(page = 1) {
            try {
                // Pass the page number to the API request
                const response = await fetch(`/api/comments?page=${page}`);
                const data = await response.json();
                const container = document.getElementById('comments-placeholder');
                
                // Handle case where no comments are returned
                if (data.length === 0) {
                    container.innerHTML = "<p>No more comments to show.</p>";
                    return;
                }

                container.innerHTML = data.map(c => `
                    <div class="comment-item">
                        <strong>${c.username}</strong>: <p>${c.commentText}</p>
                        <small>${c.timestamp}</small>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Error loading comments:", err);
            }
        }
        
        document.getElementById('reviewForm').addEventListener('submit', async (e) => {
            e.preventDefault(); 
            
            const username = document.getElementById('username').value;
            const commentText = document.getElementById('commentText').value;

            const response = await fetch('/api/comments', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, commentText })
            });

            if (response.ok) {
                document.getElementById('reviewForm').reset(); 
                fetchComments(); 
            } else {
                alert('Failed to post. Check server logs.');
            }
        });

        fetchComments();
    </script>
</body>
</html>
